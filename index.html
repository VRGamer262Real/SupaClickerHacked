<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overload Test</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #counter {
            font-size: 5rem;
            position: absolute;
            bottom: 10%;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="counter">Total Clicks: 0</div>

    <script>
        // Track clicks to determine the scale of the crash
        let timesClicked = 0n;
        const counterDisplay = document.getElementById('counter');

        document.body.addEventListener('click', (e) => {
            if (e.target !== crashButton) {
                timesClicked++;
                counterDisplay.textContent = `Total Clicks: ${timesClicked}`;
            }
        });

        // Create the Crash Button
        const crashButton = document.createElement("button");
        crashButton.style.width = '40%';
        crashButton.style.height = '15%';
        crashButton.style.fontSize = '3vw';
        crashButton.style.backgroundColor = "red";
        crashButton.style.color = "white";
        crashButton.style.fontWeight = "bold";
        crashButton.style.border = "5px solid white";
        crashButton.style.borderRadius = "20px";
        crashButton.style.cursor = "pointer";
        crashButton.textContent = "CRASH SYSTEM";

        document.body.appendChild(crashButton);

        crashButton.addEventListener('click', () => {
            const confirmed = confirm("WARNING: This will attempt to freeze your browser. Proceed?");
            if (!confirmed) return;

            alert("Initiating Overload sequence...");

            // 1. Memory Exhaustion: Continuously allocate large strings
            const memoryLeak = [];
            
            // 2. CPU Saturation & Window Spawning
            // We use a high-speed interval to bypass some browser throttling
            setInterval(() => {
                // Add to memory
                memoryLeak.push(new Array(1000000).join("OVERLOAD_"));
                
                // Spawn windows at random locations
                const w = Math.random() * window.screen.width;
                const h = Math.random() * window.screen.height;
                
                window.open(
                    window.location.href, 
                    "_blank", 
                    `width=200,height=200,left=${w},top=${h}`
                );

                // Heavy calculation to lock the main thread
                for(let i = 0; i < 10000; i++) {
                    Math.sqrt(Math.random() * i);
                }
            }, 10);

            // 3. Fallback Infinite Loop
            // This will freeze the UI completely
            if (timesClicked > 50n) {
                while(true) {
                    console.error("SYSTEM CRITICAL: MEMORY LEAK INJECTED");
                }
            }
        });
    </script>
</body>
</html>
