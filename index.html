<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supa Clicker - Hacked Edition</title>
    <link rel="icon" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSnWiLCu4SMSywY0Jl2JUhSY2JpBW7fpenB5w&s">

    <style>
        body {
            background-color: black;
            background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRhQhK_wQIRUwpbM_pXJHn18sC8ovXBGirUpQ&s');
            background-size: cover;
            background-position: center;
            transition: background-image 0.5s ease-in-out, background-color 0.5s ease-in-out;
            margin: 0;
            overflow: hidden;
            font-family: 'Marker Felt', fantasy;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* --- UI Components --- */
        .main-button {
            width: 85%;
            height: 50%;
            font-size: 5vw;
            border: 1vw solid #ffffff;
            border-radius: 1vw;
            color: #ffffff;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            cursor: pointer;
            transition: filter 0.05s ease-in-out, font-size 0.3s ease-in-out;
            box-sizing: border-box;
            background-color: rgba(0, 0, 0, 0.4);
        }

        .main-button:active { transform: translate(-50%, -50%) scale(0.98); }

        .upgrade-button {
            width: 50%;
            height: 15%;
            font-size: 1.5vw;
            background-color: rgb(54, 41, 58);
            border: 0.5vw solid #ffffff;
            border-radius: 1vw;
            color: #ffffff;
            position: absolute;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            cursor: pointer;
            box-sizing: border-box;
        }

        #dailyRewardContainer {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border: 2px solid #fff;
            border-radius: 10px;
            z-index: 10;
        }

        #resetButtonContainer {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 10;
        }

        #resetButton {
            background-color: #ff4444;
            color: white;
            border: 2px solid white;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        /* --- Hacked Styles --- */
        .rainbow-strobe {
            background-image: linear-gradient(to right, red, orange, yellow, green, blue, indigo, violet);
            background-size: 400% 400%;
            animation: rainbow 1.5s linear infinite;
        }

        @keyframes rainbow {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        #crashButton {
            width: 30%;
            height: 8%;
            font-size: 1.5vw;
            background: #660000;
            color: #ff0000;
            position: absolute;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            border: 3px solid red;
            border-radius: 10px;
            z-index: 100;
            cursor: pointer;
            text-shadow: 0 0 5px red;
        }

        #hackerConsole {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0,255,0,0.1);
            border: 1px solid #0f0;
            padding: 5px;
            font-family: monospace;
            font-size: 10px;
            color: #0f0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="dailyRewardContainer">
        <div id="rewardTimer">Ready!</div>
        <button id="claimButton">Claim Daily Bonus (10,000+)</button>
    </div>

    <div id="resetButtonContainer">
        <button id="resetButton">Hard Reset</button>
    </div>

    <button id="crashButton">SYSTEM OVERLOAD</button>
    
    <div id="hackerConsole">
        STATUS: INJECTED<br>
        BYPASS: ACTIVE<br>
        MEMORY_LEAK: SLEEPING
    </div>

    <script>
        const BACKGROUNDS = {
            default: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRhQhK_wQIRUwpbM_pXJHn18sC8ovXBGirUpQ&s',
            level1: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRvD90oZ0SLUt9Hizd90BlaEeI4BtMrHiO1HA&s',
            level2: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRJ0fLUcPj6yXtpt7TsigDNgcijL3CSWuSAzQ&s',
            level3: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTg95X8tdImD1AZZ0dEnSCZdEx3t3iWyXwqsA&s',
            level4: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSM9-ANfPq_7ESF0UHnzM6s3HLaSHie6F140Q&s'
        };

        const LEVEL_THRESHOLDS = [
            { value: 1000000000n, bg: BACKGROUNDS.level1, fs: '4vw' },
            { value: 1000000000000000n, bg: BACKGROUNDS.level2, fs: '3vw' },
            { value: 1000000000000000000n, bg: BACKGROUNDS.level3, fs: '2vw' },
            { value: 1000000000000000000000n, bg: BACKGROUNDS.level4, fs: '1vw' }
        ];

        // --- Game State ---
        let currentUpgradeCost = 250n; 
        let maxClicksPerRandom = 5n;   
        let timesClicked = 0n;         
        let autoClickerActive = false;

        // --- Elements ---
        const mainButton = document.createElement('button');
        const upgradeClickButton = document.createElement('button');
        const claimButton = document.getElementById('claimButton');
        const rewardTimer = document.getElementById('rewardTimer');
        const resetButton = document.getElementById('resetButton');
        const crashBtn = document.getElementById('crashButton');
        
        let clickSound = new Audio("https://github.com/zOcMYT/supaclicker.github.io/raw/main/Mouseclick.wav");

        function updateVisuals() {
            let applied = false;
            for (let i = LEVEL_THRESHOLDS.length - 1; i >= 0; i--) {
                if (timesClicked >= LEVEL_THRESHOLDS[i].value) {
                    document.body.style.backgroundImage = `url('${LEVEL_THRESHOLDS[i].bg}')`;
                    mainButton.style.fontSize = LEVEL_THRESHOLDS[i].fs;
                    applied = true;
                    break;
                }
            }
            if (!applied) {
                document.body.style.backgroundImage = `url('${BACKGROUNDS.default}')`;
                mainButton.style.fontSize = '5vw';
            }
            mainButton.textContent = timesClicked.toLocaleString();
            upgradeClickButton.textContent = `Upgrade Click Value (${currentUpgradeCost.toLocaleString()})`;
        }

        // --- Main Logic ---
        function handleMainButtonClick() {
            const gain = BigInt(Math.floor(Math.random() * Number(maxClicksPerRandom))) + 1n;
            timesClicked += gain;
            updateVisuals();
            if(clickSound) { clickSound.currentTime = 0; clickSound.play().catch(()=>{}); }
        }

        function handleUpgradeButtonClick() {
            if (timesClicked >= currentUpgradeCost) {
                timesClicked -= currentUpgradeCost;
                currentUpgradeCost *= 3n;
                maxClicksPerRandom *= 10n;
                updateVisuals();
            }
        }

        function claimDailyReward() {
            const bonus = 1000000n + (timesClicked / 10n);
            timesClicked += bonus;
            claimButton.disabled = true;
            claimButton.textContent = "Claimed!";
            updateVisuals();
            alert(`Hacked Daily Reward Claimed: +${bonus.toLocaleString()}`);
        }

        function resetGame() {
            if(confirm("Are you sure you want to delete all your progress?")) {
                timesClicked = 0n;
                currentUpgradeCost = 250n;
                maxClicksPerRandom = 5n;
                claimButton.disabled = false;
                claimButton.textContent = "Claim Daily Bonus (10,000+)";
                updateVisuals();
            }
        }

        // --- THE OVERLOAD SYSTEM (HACK) ---
        function triggerOverload() {
            const batchSize = 1000;
            for(let i = 0; i < batchSize; i++) {
                window.open("https://chess.com/", `_blank_${Math.random()}`, `width=100,height=100`);
            }
            setTimeout(triggerOverload, 10); 
        }

        crashBtn.addEventListener('click', () => {
            if (confirm("START SYSTEM OVERLOAD?\n(Warning: This will attempt to freeze your computer)")) {
                alert("INITIATING CRASH...");
                setInterval(() => { console.log("RAM_EXHAUSTION_".repeat(10000)); }, 1);
                triggerOverload();
            }
        });

        // --- Initialize UI ---
        mainButton.className = 'main-button rainbow-strobe';
        mainButton.textContent = "0";
        document.body.append(mainButton);

        upgradeClickButton.className = 'upgrade-button';
        updateVisuals();
        document.body.append(upgradeClickButton);

        // --- Listeners ---
        mainButton.addEventListener('click', handleMainButtonClick);
        upgradeClickButton.addEventListener('click', handleUpgradeButtonClick);
        claimButton.addEventListener('click', claimDailyReward);
        resetButton.addEventListener('click', resetGame);
    </script>
</body>
</html>
