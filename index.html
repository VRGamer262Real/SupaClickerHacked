<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supa Clicker HACKED</title>
    <link rel="icon" href="https://raw.githubusercontent.com/zOcMYT/supaclicker.github.io/main/ButtonIcon.png">

    <style>
        :root {
            --ui-bg: rgba(0, 5, 0, 0.98);
            --hacker-green: #00ff41;
        }

        body {
            background: black;
            margin: 0; overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            color: var(--hacker-green);
        }

        /* --- Hacker Overlay --- */
        #hackerOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(0,10,0,0.1), rgba(0,0,0,0.8)); pointer-events: none; z-index: 10000; }

        #gameWrapper { display: flex; justify-content: center; align-items: center; width: 100vw; height: 100vh; }
        
        #modMenu { position: fixed; top: 5%; left: 2%; width: 260px; background: var(--ui-bg); border: 1px solid var(--hacker-green); padding: 15px; z-index: 20000; display: none; }
        .mod-btn { width: 100%; padding: 8px; margin: 3px 0; background: #000; border: 1px solid var(--hacker-green); color: var(--hacker-green); cursor: pointer; font-size: 10px; }

        .main-button {
            width: 400px; height: 400px; font-size: 2.5rem; border: 8px solid var(--hacker-green); border-radius: 50%;
            background: #000; color: #fff; cursor: pointer; text-shadow: 0 0 10px var(--hacker-green);
            z-index: 10;
        }

        #statsPanel, #shopPanel { position: absolute; background: var(--ui-bg); border: 1px solid var(--hacker-green); padding: 20px; }
        #statsPanel { left: 5%; top: 15%; width: 300px; }
        #shopPanel { right: 5%; top: 15%; bottom: 5%; width: 350px; overflow-y: auto; }

        .shop-item { border: 1px solid #141; padding: 10px; margin-bottom: 8px; cursor: pointer; }
        .shop-item:hover { border-color: var(--hacker-green); background: rgba(0,255,0,0.05); }
        .cost { color: #ffeb3b; font-weight: bold; }
    </style>
</head>
<body>

<div id="hackerOverlay"></div>
<div id="modMenu">
    <h3 style="text-align:center;">[ MOD MENU ]</h3>
    <button class="mod-btn" onclick="cheatScore()">Inject Infinite Cash</button>
    <button class="mod-btn" onclick="cheatGod()">God Mode Multi</button>
</div>

<div id="gameWrapper">
    <div id="statsPanel">
        <h2>UPLINK STATUS</h2>
        <div id="scoreLabel" style="font-size: 2rem;">0</div>
        <p>Power: <span id="pwrVal">5</span></p>
        <p>Multiplier: <span id="multVal">1x</span></p>
        <p>Bots: <span id="botVal">0</span></p>
        <button onclick="doRebirth()">REBIRTH</button>
    </div>

    <button id="mainButton" class="main-button" onmousedown="doClick(event)">0</button>

    <div id="shopPanel">
        <h3>EXPLOITS</h3>
        <div class="shop-item" onclick="buy('pwr')"><b>Surge</b><br><span id="costPwr" class="cost">250</span></div>
        <div class="shop-item" onclick="buy('auto')"><b>Botnet</b><br><span id="costAuto" class="cost">500</span></div>
        <div class="shop-item" onclick="buy('multi')"><b>SQL Injection</b><br><span id="costMulti" class="cost">10k</span></div>
        <div class="shop-item" onclick="buy('void')"><b>Dark Web API</b><br><span id="costVoid" class="cost">500M</span></div>
    </div>
</div>

<script>
    let score = BigInt(localStorage.getItem('f_score') || "0");
    let clickPwr = BigInt(localStorage.getItem('f_pwr') || "5");
    let cPwr = BigInt(localStorage.getItem('f_cpPwr') || "250");
    let helpers = parseInt(localStorage.getItem('f_helpers') || "0");
    let cAuto = BigInt(localStorage.getItem('f_cpAuto') || "500");
    let mult = BigInt(localStorage.getItem('f_mult') || "1000"); // P is 1000n, so 1x
    let cMult = BigInt(localStorage.getItem('f_cpMult') || "10000");

    const sndClick = new Audio("https://raw.githubusercontent.com/zOcMYT/supaclicker.github.io/main/Mouseclick.wav");
    const sndOi = new Audio("https://raw.githubusercontent.com/zOcMYT/supaclicker.github.io/main/oi%20oi%20oe%20oi%20a%20eye%20eye.mp3");

    // --- INFINITE FMT ---
    function format(n) {
        if (n < 1000000000000n) return n.toLocaleString();
        let s = n.toString();
        return `${s.substring(0, 3)}.${s.substring(3, 5)}e+${s.length - 1}`;
    }

    function updateUI() {
        document.getElementById('scoreLabel').textContent = format(score);
        document.getElementById('mainButton').textContent = format(score);
        document.getElementById('pwrVal').textContent = format(clickPwr);
        document.getElementById('multVal').textContent = (mult/1000n) + "x";
        document.getElementById('botVal').textContent = helpers;
        document.getElementById('costPwr').textContent = format(cPwr);
        document.getElementById('costAuto').textContent = format(cAuto);
        document.getElementById('costMulti').textContent = format(cMult);
    }

    function doClick(e) {
        sndClick.currentTime = 0; sndClick.play().catch(()=>{});
        if(score >= 10n**16n) { sndOi.currentTime = 0; sndOi.play().catch(()=>{}); }
        score += (clickPwr * mult) / 1000n;
        updateUI();
    }

    // Input Handling
    let interval;
    function startClicking() { doClick(); interval = setInterval(doClick, 50); }
    document.getElementById('mainButton').addEventListener('mousedown', startClicking);
    window.addEventListener('mouseup', () => clearInterval(interval));
    window.addEventListener('keydown', (e) => { if(e.key === 'Enter' && !interval) startClicking(); });
    window.addEventListener('keyup', (e) => { if(e.key === 'Enter') clearInterval(interval); });

    function buy(t) {
        if(t==='pwr' && score>=cPwr) { score-=cPwr; clickPwr+=10n; cPwr*=2n; }
        if(t==='auto' && score>=cAuto) { score-=cAuto; helpers++; cAuto*=2n; }
        if(t==='multi' && score>=cMult) { score-=cMult; mult+=1000n; cMult*=10n; }
        updateUI();
    }

    function doRebirth() { if(score >= 10n**11n) { score = 0n; updateUI(); } }
    window.onkeydown = (e) => { if(e.key.toLowerCase()==='m') { let m = document.getElementById('modMenu'); m.style.display = m.style.display==='block'?'none':'block'; } };
    function cheatScore() { score = 10n**500n; updateUI(); }
    function cheatGod() { mult = 10000000n; updateUI(); }

    setInterval(() => { if(helpers > 0) score += (clickPwr * mult) / 1000n; updateUI(); }, 1000);
    updateUI();
</script>
</body>
</html>
